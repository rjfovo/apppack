# HelloWorld 默认配置
# 用户自定义配置位于 ~/.config/HelloWorld/settings.conf
# 应用会优先读取用户配置，再回退到此默认配置

[General]
# 应用主题 (default / dark / light)
theme=default
# 界面语言 (system / zh_CN / en_US)
language=system
# 是否自动保存
auto_save=true

[Window]
# 窗口大小
width=800
height=600
# 启动时是否最大化
maximized=false

[Recent]
# 最近打开的文件列表（最多 10 个）
max_recent_files=10
